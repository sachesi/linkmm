name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: input
    id: problem
    attributes:
      label: Problem statement
      placeholder: "What user problem does this solve?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
