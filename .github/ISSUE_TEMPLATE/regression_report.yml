name: Regression report
description: Report behavior that worked before but is now broken
labels: [regression]
body:
  - type: input
    id: last_good
    attributes:
      label: Last known good version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: input
    id: first_bad
    attributes:
      label: First known bad version
      placeholder: "e.g. 0.1.1"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Regression details
    validations:
      required: true
