name: Release Checklist

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (SemVer, e.g. 0.2.0)"
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        run: |
          if ! [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be strict SemVer x.y.z"
            exit 1
          fi
      - name: Show checklist
        run: |
          echo "Release checklist for v${{ github.event.inputs.version }}"
          cat docs/release/checklist.md
